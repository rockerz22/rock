<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert NOC - Service Desk Full Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #007bff;
            --bg-body: #eef3f9;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
        }

        /* --- HEADER (สไตล์ที่คุณเลือก) --- */
        .header-container {
            width: 100%;
            background: linear-gradient(135deg, #001a33 0%, #004080 100%);
            position: relative;
            overflow: hidden;
            color: white;
        }

        .bg-gears {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .gear {
            position: absolute;
            color: rgba(255,255,255,0.05);
            animation: spin 20s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .header-main {
            display: flex; align-items: center; justify-content: space-between;
            padding: 30px 5%; position: relative; z-index: 2;
        }

        .logo-box {
            background: white; padding: 10px 25px; border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,123,255,0.5);
        }

        .logo-box img { max-height: 60px; }

        .info-bar {
            background: rgba(0,0,0,0.4); padding: 8px 5%;
            display: flex; justify-content: center; gap: 20px;
            font-size: 13px; border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* --- LAYOUT FORM --- */
        .main-content {
            width: 95%; max-width: 1300px;
            margin: 30px auto; display: grid; gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            overflow: hidden;
            border-top: 4px solid var(--accent-blue);
        }

        .card-header {
            background: #f8f9fa;
            padding: 12px 20px;
            font-weight: bold;
            color: var(--primary-blue);
            border-bottom: 1px solid #eee;
            display: flex; align-items: center; gap: 10px;
        }

        .card-body { padding: 20px; }

        /* GRID SYSTEM */
        .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #555; }
        
        input, select, textarea {
            padding: 10px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; transition: 0.3s;
        }

        input:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }

        .bg-light-blue { background-color: #f0f7ff; }

        /* TABLE สำหรับ Ticket Log */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: #f4f4f4; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .btn-search { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-save { background: #28a745; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto; }

        @media (max-width: 900px) { .form-grid-3, .form-grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header-container">
    <div class="bg-gears">
        <i class="fa-solid fa-gear gear" style="font-size:200px; left:-50px; top:-50px;"></i>
        <i class="fa-solid fa-gear gear" style="font-size:150px; right:-30px; bottom:-30px; animation-duration:15s;"></i>
    </div>
    <header class="header-main">
        <div style="flex:1"> <i class="fa-solid fa-gear" style="font-size:50px; color:var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); animation: spin 5s linear infinite;"></i></div>
        <div class="logo-box">
            <img src="EXP.png" alt="Logo">
        </div>
        <div style="flex:1; text-align:right;">
            <h2 style="margin:0;">SERVICE DESK</h2>
            <small>ระบบแจ้งเสีย</small>
        </div>
    </header>
    <div class="info-bar">
        <span><i class="fa-solid fa-clock"></i> <span id="time"></span></span>
        <span><i class="fa-solid fa-calendar"></i> <span id="date"></span></span>
        <span><i class="fa-solid fa-user"></i> Admin Staff</span>
    </div>
</div>

<div class="main-content">
    
    <div class="card">
        <div class="card-header"><i class="fa-solid fa-magnifying-glass"></i> Quick Search & Service Type</div>
        <div class="card-body">
            <div class="form-grid-3">
                <div class="form-group">
                    <label>Search by</label>
                    <div style="display:flex; gap:5px;">
                        <select style="width:40%"><option>Site</option></select>
                        <input type="text" placeholder="ชื่อหน่วยงาน / Name Site / เลขสัญญา" style="flex:1">
                        <button class="btn-search">Search</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Service Type</label>
                    <select class="bg-light-blue"><option>CASE</option></select>
                </div>
                <div class="form-group">
                    <label>Contact Channel</label>
                    <div style="display:flex; gap:5px;">
                        <select style="flex:1"><option>เลือกช่องทาง</option></select>
                        <button class="btn-search">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-grid-2">
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-user"></i> Customer Information</div>
            <div class="card-body">
                <div class="form-group">
                    <label>Customer</label>
                    <input type="text" placeholder="สมาชิกเครือข่าย">
                </div>
                <div class="form-grid-2">
                    <div class="form-group"><label>School Code (Project Code)</label><input type="text" value="1001"></div>
                    <div class="form-group"><label>Site</label><input type="text"></div>
                </div>
                <div class="form-group">
                    <label>Site Address</label>
                    <textarea readonly style="background:#f9f9f9; height:60px;">แขวงทุ่งพญาไท, เขตราชเทวี, กรุงเทพมหานคร 10400&#10;Lat: 13.7578 / Long: 100.5308</textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-address-book"></i> Contact Detail</div>
            <div class="card-body">
                <div class="form-group">
                    <label>Contract</label>
                    <select><option>46/2568 UPS&GEN, CM</option></select>
                </div>
                <div class="form-group">
                    <label>Contact Name</label>
                    <input type="text" placeholder="ชื่อผู้ติดต่อ">
                </div>
                <div class="form-group">
                    <label>Contact Detail (Mobile/Email)</label>
                    <textarea style="height:60px;"></textarea>
                </div>
                <div class="form-group" style="flex-direction:row; gap:10px;">
                    <input type="checkbox" id="email_notify"> <label for="email_notify">Email notification</label>
                </div>
            </div>
        </div>
    </div>

    <div class="form-grid-2">
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-circle-info"></i> Case Information</div>
            <div class="card-body">
                <div class="form-group">
                    <label>Case ID</label>
                    <input type="text" value="NC-2026-04-0002" readonly style="color:red; font-weight:bold;">
                </div>
                <div class="form-grid-3">
                    <div class="form-group"><label>Impact</label><select><option>Low</option></select></div>
                    <div class="form-group"><label>Urgency</label><select><option>Low</option></select></div>
                    <div class="form-group"><label>Priority</label><input type="text" value="Very Low" readonly></div>
                </div>
                <div class="form-group">
                    <label>Down Time (วันที่เริ่มเสีย)</label>
                    <input type="datetime-local">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea style="height:80px;" required></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-user-gear"></i> Engineer & Assignment</div>
            <div class="card-body">
                <div class="form-group">
                    <label>Case Type</label>
                    <select><option>NOC Case</option></select>
                </div>
                <div class="form-group">
                    <label>Engineer ผู้รับผิดชอบ</label>
                    <div style="display:flex; gap:5px;">
                        <input type="text" placeholder="ระบุชื่อช่าง" style="flex:1">
                        <button class="btn-search"><i class="fa-solid fa-location-dot"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Up Time (วันที่แก้ไขเสร็จ)</label>
                    <input type="datetime-local">
                </div>
                <div class="form-group">
                    <label>Remark</label>
                    <textarea style="height:80px;"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fa-solid fa-clock-rotate-left"></i> Reference & Ticket Log</div>
        <div class="card-body">
            <div class="form-grid-2">
                <div class="form-group"><label>Customer Case</label><input type="text"></div>
                <div class="form-group"><label>Vendor Case</label><input type="text"></div>
            </div>
            
            <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                <label>Ticket Log / Working Log</label>
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>By</th>
                            <th>Type</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-04-27 10:00</td>
                            <td>System</td>
                            <td>Created</td>
                            <td>Case created successfully</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <button class="btn-save">💾 SAVE / UPDATE TICKET</button>

</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString('th-TH');
        document.getElementById('date').innerText = now.toLocaleDateString('th-TH', {day:'numeric', month:'long', year:'numeric'});
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
